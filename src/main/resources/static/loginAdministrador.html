<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingreso Administrador - Hipódromo</title>
    <link rel="stylesheet" href="/css/loginAdministrador.css">
</head>
<body>

    <main class="login-wrapper">
        <section class="login-card">
            <div class="logo">🏇</div>

            <h1>Hipódromo MalaPata</h1>
            <p class="subtitle">Zona de administración</p>

            <form id="formLogin">
                <label for="nombreUsuario">Nombre de usuario</label>
                <input type="text" id="nombreUsuario" name="nombreUsuario" autocomplete="username">

                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" autocomplete="current-password">

                <button type="submit">Ingresar</button>
            </form>

            <p id="mensajeError" class="mensaje-error"></p>
        </section>
    </main>

    <script type="module">
        import CommandDispatcher from "/js/CommandDispatcher.js";

        const view = CommandDispatcher.registerView("LoginAdministrador", {
            onException: mostrarError,
            onError: (status, text) => mostrarError(text || "Error inesperado")
        });

        view.handler("accesoPermitido", () => {
            window.location.href = "/tableroAdministrador.html";
        });

        view.handler("mensajeError", (mensaje) => {
            mostrarError(mensaje);
        });

        document.getElementById("formLogin").addEventListener("submit", function(e) {
            e.preventDefault();

            const nombreUsuario = document.getElementById("nombreUsuario").value.trim();
            const password = document.getElementById("password").value.trim();

            if (nombreUsuario === "" || password === "") {
                mostrarError("Debe ingresar usuario y contraseña.");
                return;
            }

            CommandDispatcher.submit("/administracion/login", {
                nombreUsuario: nombreUsuario,
                password: password
            });
        });

        function mostrarError(mensaje) {
            document.getElementById("mensajeError").textContent = mensaje;
        }

        CommandDispatcher.startView(view);
    </script>

</body>
</html>
